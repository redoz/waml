services:
  - type: web
    name: owox-model-canvas
    runtime: node
    plan: starter
    # corepack provides pnpm (version pinned via package.json "packageManager")
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm --filter @mc/server start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # AI "Insight Questions" key. Acts as a kill-switch: when it's unset the
      # whole AI feature (Business Goal nav + questions panel) disappears, so if
      # the API quota runs out you can drop the key to turn it off without a code
      # redeploy. Not inherited by preview/branch deploys → AI is off there.
      - key: GEMINI_API_KEY
        sync: false
      # PostHog project token (public). Inlined into the web build by Vite at
      # build time, so it must be present in the build environment. Unset in
      # preview deploys → analytics stays off there.
      - key: VITE_POSTHOG_KEY
        sync: false
