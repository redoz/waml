name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: lint · test · build
    strategy:
      fail-fast: false
      matrix:
        # Windows is in the matrix on purpose: the parser is path/line based
        # and cross-platform bugs have shipped to main before (no gate existed).
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version comes from the "packageManager" field in package.json.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      # The Rust crates are the source of truth for parse/model/validate/ops.
      - name: Cargo test
        run: cargo test --workspace

      # Regenerate the inlined wasm module so a stale commit can't hide a drift
      # between the Rust core and the checked-in packages/wasm/src/generated files.
      - name: Build wasm
        run: pnpm build:wasm

      - name: Lint
        run: pnpm lint

      # Build first: web tests import @waml/okf, which resolves to its
      # compiled dist/. Without this the test job can't resolve the package.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm -r test
