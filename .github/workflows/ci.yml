name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: lint · test · build
    strategy:
      fail-fast: false
      matrix:
        # Windows is in the matrix on purpose: the parser is path/line based
        # and cross-platform bugs have shipped to main before (no gate existed).
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version comes from the "packageManager" field in package.json.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build first: web/server tests import @mc/okf, which resolves to its
      # compiled dist/. Without this the test job can't resolve the package.
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm -r test
